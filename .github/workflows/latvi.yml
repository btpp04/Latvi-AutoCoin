name: Latvi Auto Coin

on:
  schedule:
    - cron: '7 0,12 * * *'
  workflow_dispatch:
    inputs:
      manual:
        description: 'Manual trigger'
        required: false
        default: 'true'

env:
  LATVI_EMAIL: ${{ secrets.LATVI_EMAIL }}
  LATVI_PASSWORD: ${{ secrets.LATVI_PASSWORD }}
  PROXY: ${{ secrets.PROXY }}
  TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
  TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
  MAX_CLAIMS: "20"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🛡️ Setup proxy tunnel (sing-box for hy2 / GOST for std)
        if: ${{ env.PROXY != '' }}
        continue-on-error: true
        run: |
          echo "Proxy type: ${PROXY:0:12}"
          if [[ "$PROXY" == hysteria2://* ]]; then
            echo "==> hy2 detected, starting sing-box tunnel =="
            curl -L -o sb.tar.gz "https://github.com/SagerNet/sing-box/releases/download/v1.11.7/sing-box-1.11.7-linux-amd64.tar.gz"
            tar -xzf sb.tar.gz
            mv sing-box-*/sing-box ./sing-box
            chmod +x ./sing-box
            python3 -c "import os,json,re,urllib.parse; u=os.environ['PROXY']; m=re.match(r'hysteria2://([^@]+)@([^:]+):(\\d+)\\?([^#]*)',u); pw=m.group(1); srv=m.group(2); port=int(m.group(3)); qs=dict(urllib.parse.parse_qsl(m.group(4))); peer=qs.get('peer','www.bing.com'); json.dump({'log':{'level':'warn'},'inbounds':[{'type':'socks','tag':'socks-in','listen':'127.0.0.1','listen_port':1080}],'outbounds':[{'type':'hysteria2','tag':'proxy','server':srv,'server_port':port,'password':pw,'tls':{'enabled':True,'server_name':peer,'insecure':True}}]},open('sb_config.json','w')); print('sing-box config written')"
            nohup ./sing-box run -c sb_config.json > /tmp/sb.log 2>&1 &
            # wait for socks5 port to be actually listening (not just process start)
            for i in $(seq 1 20); do
              if curl -s --max-time 3 -x socks5://127.0.0.1:1080 https://api.ipify.org >/dev/null 2>&1; then
                echo "SING-BOX OK (port live)"; break
              fi
              sleep 1
            done
            pgrep sing-box >/dev/null && echo "sing-box proc up" || echo "SING-BOX FAILED"
            curl -s --max-time 10 -x socks5://127.0.0.1:1080 https://api.ipify.org && echo " <- tunnel ip" || echo "verify skipped"
          else
            echo "==> standard proxy, starting GOST tunnel =="
            curl -L -o gost.tar.gz "https://github.com/ginuerzh/gost/releases/download/v2.12.0/gost_2.12.0_linux_amd64.tar.gz"
            tar -xzf gost.tar.gz
            chmod +x gost
            nohup ./gost -L http://:8080 -F "$PROXY" > /tmp/gost.log 2>&1 &
            sleep 4
            pgrep gost && echo "GOST OK" || echo "GOST FAILED"
            curl -s --max-time 10 -x http://127.0.0.1:8080 https://ipinfo.talordata.com 2>/dev/null | jq -r '{ip, isp} | join(" | ")' 2>/dev/null || echo "GOST verify skipped"
          fi
          
      - name: 📦 Install requests (with socks fallback)
        run: |
          pip install requests
          pip install requests[socks] 2>/dev/null || true
          
      - name: 🌐 Test proxy connectivity
        run: |
          echo "=== Direct proxy test ==="
          if curl -s --max-time 15 -x "$PROXY" https://dash.latvi.space > /dev/null 2>&1; then echo "PROXY OK"; else echo "PROXY FAILED"; fi

      - name: 🚀 Run (daily reward + linkvertise)
        run: python latvi_coins.py

      - name: 📸 Screenshot + TG notification
        if: env.TG_BOT_TOKEN != ''
        continue-on-error: true
        run: |
          pip install playwright
          python -m playwright install chromium --with-deps 2>&1 | tail -5
          pip install pillow
          python latvi_screenshot.py
