name: Latvi Auto Coin

on:
  schedule:
    - cron: '7 0,12 * * *'
  workflow_dispatch:
    inputs:
      manual:
        description: 'Manual trigger'
        required: false
        default: 'true'

  push:
    branches:
      - main

env:
  LATVI_EMAIL: ${{ secrets.LATVI_EMAIL }}
  LATVI_PASSWORD: ${{ secrets.LATVI_PASSWORD }}
  PROXY: ${{ secrets.PROXY }}
  TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
  TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
  MAX_CLAIMS: "20"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🛡️ Start GOST tunnel
        if: ${{ env.PROXY != '' }}
        continue-on-error: true
        run: |
          echo "Proxy type: ${PROXY:0:8}"
          
          # Download GOST
          curl -L -o gost.tar.gz "https://github.com/ginuerzh/gost/releases/download/v2.12.0/gost_2.12.0_linux_amd64.tar.gz"
          tar -xzf gost.tar.gz
          chmod +x gost
          
          # Start tunnel
          nohup ./gost -L http://:8080 -F "$PROXY" > /tmp/gost.log 2>&1 &
          sleep 4
          pgrep gost && echo "GOST OK" || echo "GOST FAILED"
          
          # Verify
          curl -s --max-time 10 -x http://127.0.0.1:8080 https://ipinfo.talordata.com 2>/dev/null | jq -r '{ip, isp} | join(" | ")' 2>/dev/null || echo "GOST verify skipped"
          
      - name: 📦 Install requests (with socks fallback)
        run: |
          pip install requests
          pip install requests[socks] 2>/dev/null || true
          
      - name: 🌐 Test proxy connectivity
        run: |
          echo "=== Direct proxy test ==="
          if curl -s --max-time 15 -x "$PROXY" https://dash.latvi.space > /dev/null 2>&1; then echo "PROXY OK"; else echo "PROXY FAILED"; fi

      - name: 🚀 Run (daily reward + linkvertise)
        run: python latvi_coins.py

      - name: 🔍 Debug HTML dump
        run: |
          if [ -f /tmp/latvi_home_full.html ]; then
            echo "=== HOME PAGE ==="
            python3 -c "
import re
with open('/tmp/latvi_home_full.html') as f:
    html = f.read()
print(f'Length: {len(html)}')
for m in re.finditer(r".{0,40}(?:credit|Credits|\d+\.\d+).{0,40}", html):
    print(m.group())
for m in re.finditer(r">(\d+\.\d+)<", html):
    print(f'Num: {m.group(1)}')
"
          fi
          if [ -f /tmp/latvi_dr_full.html ]; then
            echo "=== DAILY REWARDS PAGE ==="
            python3 -c "
import re
with open('/tmp/latvi_dr_full.html') as f:
    html = f.read()
print(f'Length: {len(html)}')
for m in re.finditer(r".{0,40}(?:credit|Credits|\d+\.\d+|streak).{0,40}", html, re.I):
    print(m.group())
for m in re.finditer(r">(\d+\.\d+)<", html):
    print(f'Num: {m.group(1)}')
"
          fi

      - name: 📸 Screenshot + TG notification
        if: env.TG_BOT_TOKEN != ''
        continue-on-error: true
        run: |
          pip install playwright
          python -m playwright install chromium --with-deps 2>&1 | tail -5
          pip install pillow
          python latvi_screenshot.py
