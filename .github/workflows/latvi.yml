name: Latvi Auto Coin

on:
  schedule:
    - cron: '7 0,12 * * *'
  workflow_dispatch:

env:
  LATVI_EMAIL: ${{ secrets.LATVI_EMAIL }}
  LATVI_PASSWORD: ${{ secrets.LATVI_PASSWORD }}
  PROXY: ${{ secrets.PROXY }}
  MAX_CLAIMS: "20"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🛡️ Start GOST tunnel
        if: ${{ env.PROXY != '' }}
        run: |
          # Download GOST
          curl -L -o gost.tar.gz "https://github.com/ginuerzh/gost/releases/download/v2.12.0/gost_2.12.0_linux_amd64.tar.gz"
          tar -xzf gost.tar.gz
          chmod +x gost
          echo "GOST ready: $(ls -la gost | awk '{print $5}') bytes"
          
          # Start tunnel
          nohup ./gost -L http://:8080 -F "$PROXY" > /tmp/gost.log 2>&1 &
          sleep 4
          GOST_PID=$(pgrep gost)
          echo "GOST PID: $GOST_PID"
          
          # Verify
          IP=$(curl -s --max-time 10 -x http://127.0.0.1:8080 https://ipinfo.talordata.com 2>/dev/null | jq -r '{ip, isp} | join(" | ")' 2>/dev/null || echo "FAILED")
          echo "GOST IP: $IP"
          
      - name: 📦 Install requests (with socks fallback)
        run: |
          pip install requests
          pip install requests[socks] 2>/dev/null || true

      - name: 🚀 Run
        run: python latvi_coins.py
