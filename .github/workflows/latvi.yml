name: Latvi Auto Coin

on:
  schedule:
    - cron: '7 0,12 * * *'
  workflow_dispatch:

env:
  LATVI_EMAIL: ${{ secrets.LATVI_EMAIL }}
  LATVI_PASSWORD: ${{ secrets.LATVI_PASSWORD }}
  PROXY: ${{ secrets.PROXY }}
  MAX_CLAIMS: "20"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🛡️ Start GOST tunnel (if proxy configured)
        run: |
          if [ -n "$PROXY" ]; then
            wget -q "https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5" -O gost && chmod +x gost
            nohup ./gost -L http://:8080 -F "$PROXY" > /tmp/gost.log 2>&1 &
            sleep 3
            echo "GOST PID: $(pgrep gost || echo FAILED)"
            curl -s -x http://127.0.0.1:8080 https://ipinfo.talordata.com 2>/dev/null | jq -r '{ip, isp} | join(" | ")' || echo "GOST check skipped"
          else
            echo "No proxy configured"
          fi

      - name: 📦 Install requests
        run: pip install requests

      - name: 🚀 Run
        run: python latvi_coins.py
